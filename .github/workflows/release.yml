# Tag-triggered release pipeline.
#
# ci.yml filters on push.branches/pull_request with NO `tags:` key, so a tag
# push does NOT trigger it — the tagged commit would otherwise have zero CI.
# This workflow therefore runs its OWN `test` job and gates publishing on it.
#
# Third-party actions are SHA-pinned (supply-chain integrity on a public-binary
# pipeline); the trailing `# vN` comment records the human-readable version.
# Bump pins deliberately (see CONTRIBUTING.md). GoReleaser is pinned to the
# exact version validated locally by `make snapshot` and recorded in
# CONTRIBUTING.md — all three must stay in lockstep.
name: Release

on:
  push:
    tags:
      - "v*"

# A re-run or an accidental double tag must never race two uploads to the same
# release. Do not cancel an in-flight publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# No workflow-level permissions: each job declares least privilege explicitly.
# Every future job MUST declare its own permissions block.
jobs:
  test:
    name: Test (gate for the tagged ref)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.x"
          cache: true
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Format check
        run: test -z "$(gofmt -l .)"
      - name: Test (race detector)
        run: go test ./... -race -count=1

  verify-main:
    name: Verify tag commit is reachable from main
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Reject tags outside main
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          tag_commit=$(git rev-parse "${{ github.ref_name }}^{commit}")
          if ! git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "::error::tag commit $tag_commit is not reachable from origin/main"
            exit 1
          fi

  goreleaser:
    name: Publish release
    needs: [test, verify-main]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Fetch tags
        run: git fetch --force --tags
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.x"
          cache: true
      - name: Verify Homebrew tap write permission
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          can_push=$(gh api repos/bavanchun/homebrew-tap-typeburn --jq '.permissions.push')
          if [ "$can_push" != "true" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN cannot push to the Homebrew tap"
            exit 1
          fi
      - name: Run GoReleaser (prerelease)
        if: ${{ contains(github.ref_name, '-') }}
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7
        with:
          version: "v2.15.4"
          args: release --clean --release-notes=.github/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run GoReleaser (stable)
        if: ${{ !contains(github.ref_name, '-') }}
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7
        with:
          version: "v2.15.4"
          args: release --clean --release-notes=.github/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Scoped at the stable publish step only: a fine-grained PAT with
          # contents r/w on bavanchun/homebrew-tap-typeburn. Prereleases never
          # receive it, and this step follows the non-mutating permission check.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - name: Assert asset count
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Full matrix = 6 archives (linux/darwin/windows x amd64/arm64) +
          # checksums.txt = 7. A partial upload must fail the run loudly so a
          # broken public release is never left silently published.
          expected=7
          actual=$(gh release view "${{ github.ref_name }}" --json assets --jq '.assets | length')
          echo "assets: expected=$expected actual=$actual"
          if [ "$actual" -ne "$expected" ]; then
            echo "::error::partial release — expected $expected assets, found $actual"
            exit 1
          fi
