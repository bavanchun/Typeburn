# GoReleaser v2 — cross-platform release pipeline for Typeburn.
# Pinned tooling: this config is validated against GoReleaser v2.15.4 (the exact
# version used by .github/workflows/release.yml and documented in CONTRIBUTING.md).
# Verify locally with `make snapshot`; that proves build+archive ONLY — the
# publish/auth/release-notes path is exercised by the Phase 5 disposable-tag dry-run.
version: 2

before:
  hooks:
    # Build only. No `go mod tidy` (mutates go.sum, needs network) and no
    # `go test` (arbitrary code in the privileged publish job) — tests run in
    # release.yml's separate, least-privilege `test` job before this ever runs.
    - go build ./...

builds:
  - env:
      - CGO_ENABLED=0
      # Fail loudly on any module drift instead of silently rewriting go.sum.
      - GOFLAGS=-mod=readonly
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      # `v`-prefixed so the release-archive banner matches the `go install`
      # path, where debug.ReadBuildInfo() reports the tag as `vX.Y.Z`.
      # GoReleaser's {{ .Version }} strips the leading `v`; we re-add it.
      - -X github.com/bavanchun/Typeburn/internal/version.Version=v{{ .Version }}
      - -X github.com/bavanchun/Typeburn/internal/version.Commit={{ .Commit }}
      - -X github.com/bavanchun/Typeburn/internal/version.Date={{ .CommitDate }}

archives:
  # Plural `formats:` — singular `format:` is removed in this v2 line.
  - formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  # Release notes come from the curated CHANGELOG.md (.github/release-notes.md),
  # passed via `--release-notes` in release.yml. That flag makes GoReleaser use
  # the file and skip its own git-derived generation.
  #
  # Do NOT set `disable: true` here: GoReleaser's docs are explicit that
  # disabling the changelog ALSO ignores any `--release-notes` file and renders
  # an EMPTY release body. The exclude-everything filter below is a
  # belt-and-suspenders fallback so a hand-run `goreleaser release` without
  # `--release-notes` still never leaks raw git log into release notes.
  filters:
    exclude:
      - ".*"

release:
  github:
    owner: bavanchun
    name: Typeburn
  draft: false
